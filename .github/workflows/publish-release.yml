name: Publish Release
# Reusable workflow that handles official releases:
# - Versions packages using changesets and publishes to npm
# - Creates GitHub releases
# - Publishes canary releases if no official release was created

on:
  workflow_call:

jobs:
  publish-release:
    runs-on: ubuntu-latest

    steps:
      # Get GitHub token via the CT Changesets App
      - name: Generate GitHub token (via CT Changesets App)
        id: generate_github_token
        uses: tibdex/github-app-token@v2.1.0
        with:
          app_id: ${{ secrets.CT_CHANGESETS_APP_ID }}
          private_key: ${{ secrets.CT_CHANGESETS_APP_PEM }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Pass a personal access token (using our `ct-release-bot` account) to be able to trigger
          # other workflows
          # https://help.github.com/en/actions/reference/events-that-trigger-workflows#triggering-new-workflows-using-a-personal-access-token
          # https://github.community/t/action-does-not-trigger-another-on-push-tag-action/17148/8
          token: ${{ steps.generate_github_token.outputs.token }}

      - name: Setup Node (uses version in .nvmrc)
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'

      - name: Get yarn cache
        id: yarn-cache
        run: echo "::set-output name=dir::$(yarn config get cacheFolder)"

      - name: Verify npm version
        run: |
          npm --version
          # Ensure latest npm is installed for trusted publishing (OIDC)

      - uses: actions/cache@v5
        with:
          path: ${{ steps.yarn-cache.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock', 'patches/*.patch') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Building packages
        run: yarn build

      - name: Building package READMEs
        run: yarn generate-readmes
        env:
          CI: true

      - name: Storing release version for changeset
        id: release_version
        run: echo "VALUE=$(./scripts/print_release_version.sh)" >> $GITHUB_OUTPUT
        shell: bash
        env:
          GITHUB_TOKEN: ${{ steps.generate_github_token.outputs.token }}

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1.7.0
        with:
          commit: 'ci(changesets): version packages'
          publish: yarn changeset publish
          version: yarn changeset:version-and-format
          createGithubReleases: false
          commitMode: 'github-api'
        env:
          GITHUB_TOKEN: ${{ steps.generate_github_token.outputs.token }}
          SKIP_POSTINSTALL_DEV_SETUP: true

      - name: Create aggregate GitHub release
        if: steps.changesets.outputs.published == 'true'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ steps.generate_github_token.outputs.token }}
          RELEASE_VERSION: ${{ steps.release_version.outputs.VALUE }}
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          set -euo pipefail
          tag="v${RELEASE_VERSION}"
          body_file=$(mktemp)
          map_file=$(mktemp)
          while IFS= read -r pkg_json; do
            name=$(jq -r '.name // empty' "$pkg_json" 2>/dev/null || true)
            if [ -n "$name" ]; then
              printf '%s\t%s\n' "$name" "$(dirname "$pkg_json")" >> "$map_file"
            fi
          done < <(find . -name package.json -not -path '*/node_modules/*' -type f)
          while IFS= read -r pkg; do
            name=$(echo "$pkg" | jq -r '.name')
            version=$(echo "$pkg" | jq -r '.version')
            path=$(awk -F'\t' -v n="$name" '$1 == n { print $2; exit }' "$map_file")
            section=""
            if [ -n "$path" ] && [ -f "$path/CHANGELOG.md" ]; then
              section=$(awk -v v="$version" '
                /^## / {
                  if (in_section) exit
                  h = $0; sub(/^## /, "", h)
                  if (h == v) in_section = 1
                  next
                }
                in_section { print }
              ' "$path/CHANGELOG.md")
            fi
            printf '## %s@%s\n\n%s\n\n' "$name" "$version" "$section" >> "$body_file"
          done < <(echo "$PUBLISHED_PACKAGES" | jq -c '.[]')
          gh release create "$tag" --title "$tag" --notes-file "$body_file"

      # Publish canary releases only if the packages weren't published already
      - name: Publishing canary releases to npm registry
        if: steps.changesets.outputs.published != 'true'
        run: |
          git checkout main
          yarn changeset version --snapshot canary
          yarn changeset publish --tag canary
        env:
          GITHUB_TOKEN: ${{ steps.generate_github_token.outputs.token }}
