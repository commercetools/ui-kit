name: Publish Release
# Reusable workflow that handles official releases:
# - Versions packages using changesets and publishes to npm
# - Creates GitHub releases
# - Publishes canary releases if no official release was created

on:
  workflow_call:

jobs:
  publish-release:
    runs-on: ubuntu-latest

    steps:
      # Get GitHub token via the CT Changesets App
      - name: Generate GitHub token (via CT Changesets App)
        id: generate_github_token
        uses: tibdex/github-app-token@3beb63f4bd073e61482598c45c71c1019b59b73a # v2.1.0
        with:
          app_id: ${{ secrets.CT_CHANGESETS_APP_ID }}
          private_key: ${{ secrets.CT_CHANGESETS_APP_PEM }}

      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          # Pass a personal access token (using our `ct-release-bot` account) to be able to trigger
          # other workflows
          # https://help.github.com/en/actions/reference/events-that-trigger-workflows#triggering-new-workflows-using-a-personal-access-token
          # https://github.community/t/action-does-not-trigger-another-on-push-tag-action/17148/8
          token: ${{ steps.generate_github_token.outputs.token }}

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node (uses version in .nvmrc)
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'
          # Disable v6's built-in package-manager auto-cache: combined with
          # `registry-url`, it picks up the runner's pre-installed yarn 1
          # instead of pnpm and fails before any of our steps run. We manage
          # the pnpm store cache explicitly via actions/cache below.
          package-manager-cache: false

      - name: Get pnpm store
        id: pnpm-store
        run: echo "dir=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Verify npm version
        run: |
          npm --version
          # Ensure latest npm is installed for trusted publishing (OIDC)

      - uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: ${{ steps.pnpm-store.outputs.dir }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml', 'patches/*.patch') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Building packages
        run: pnpm build

      - name: Building package READMEs
        run: pnpm generate-readmes
        env:
          CI: true

      - name: Storing release version for changeset
        id: release_version
        run: echo "VALUE=$(./scripts/print_release_version.sh)" >> $GITHUB_OUTPUT
        shell: bash
        env:
          GITHUB_TOKEN: ${{ steps.generate_github_token.outputs.token }}

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
        with:
          commit: 'ci(changesets): version packages'
          publish: pnpm changeset publish
          version: pnpm changeset:version-and-format
          createGithubReleases: false
          commitMode: 'github-api'
        env:
          GITHUB_TOKEN: ${{ steps.generate_github_token.outputs.token }}
          SKIP_POSTINSTALL_DEV_SETUP: true

      - name: Create aggregate GitHub release
        if: steps.changesets.outputs.published == 'true'
        env:
          GITHUB_TOKEN: ${{ steps.generate_github_token.outputs.token }}
          RELEASE_VERSION: ${{ steps.release_version.outputs.VALUE }}
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: ./scripts/create-aggregate-github-release.sh

      # Publish canary releases only if the packages weren't published already
      - name: Publishing canary releases to npm registry
        if: steps.changesets.outputs.published != 'true'
        run: |
          set -euo pipefail
          git fetch origin main
          git reset --hard origin/main
          git clean -fd
          pnpm changeset version --snapshot canary
          pnpm changeset publish --tag canary
        env:
          GITHUB_TOKEN: ${{ steps.generate_github_token.outputs.token }}
