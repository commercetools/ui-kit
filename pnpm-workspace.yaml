packages:
  - design-system
  - storybook
  - generators/*
  - packages/*
  - packages/components/*
  - packages/components/buttons/*
  - packages/components/dropdowns/*
  - packages/components/fields/*
  - packages/components/inputs/*
  - packages/components/spacings/*
  - presets/*
  - visual-testing-app

# Single source of truth for external dep versions across the workspace.
# Workspace package.json files reference these via the catalog protocol:
#   "lodash": "catalog:"      -> default catalog (install-time pin)
#   "react":  "catalog:peer"  -> named "peer" catalog (consumer compatibility range)
#
# scripts/check-workspace-constraints.js enforces that every external dep
# named here is consumed only via its catalog reference; literal versions
# in workspace package.json files are an error.

