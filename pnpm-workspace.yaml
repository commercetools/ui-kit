packages:
  - design-system
  - storybook
  - generators/*
  - packages/*
  - packages/components/*
  - packages/components/buttons/*
  - packages/components/dropdowns/*
  - packages/components/fields/*
  - packages/components/inputs/*
  - packages/components/spacings/*
  - presets/*
  - visual-testing-app

# Shared dependency versions consumed via `catalog:` in workspace package.json
# files. Versions are the exact specs the workspaces used before adoption, so
# adopting catalog references is a no-op for resolution.
#
# `check-workspace-constraints.js` enforces that workspaces using a cataloged
# dep reference it as `catalog:` — literal versions are an error.
catalog:
  '@babel/runtime': ^7.20.13
  '@babel/runtime-corejs3': ^7.20.13
  '@emotion/react': ^11.10.5
  '@emotion/styled': ^11.10.5
  downshift: 9.0.10
  history: 4.10.1
  lodash: 4.18.1
  prop-types: ^15.8.1
  react-is: 19.2.0
  react-select: 5.10.2
